<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaySo — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .mark svg{ width:22px; height:22px; }
  .authwrap{ display:grid; grid-template-columns: 1fr 1fr; min-height: calc(100vh - 32px - 2 * var(--frame)); }
  .authbrand{ padding: 40px; display:flex; flex-direction:column; justify-content:space-between; background:
    linear-gradient(200deg, #13181B 0%, #003A6C 60%, #FFBF65 95%); border-right:1px solid var(--line-dark); }
  .authform{ padding: 64px clamp(32px, 6vw, 96px); display:flex; flex-direction:column; justify-content:center; }
  .authform .top{ margin-bottom:40px; }
  .toggle-row{ display:flex; border:1px solid var(--line); margin-bottom:34px; width:fit-content; }
  .toggle-row a{ font-family:var(--font-mono); font-size:0.7rem; letter-spacing:0.08em; text-transform:uppercase; padding:10px 20px; }
  .toggle-row a.active{ background:var(--neverything); color:var(--moonlight); }
  .rule{ display:flex; align-items:center; gap:14px; margin: 26px 0; font-family:var(--font-mono); font-size:0.66rem; letter-spacing:0.08em; text-transform:uppercase; opacity:0.5; }
  .rule::before,.rule::after{ content:""; flex:1; height:1px; background: var(--line); }
  .oauth{ display:flex; gap:12px; }
  .oauth .btn{ flex:1; justify-content:center; }
  .demo-line{ font-family:var(--font-mono); font-size:0.75rem; color:var(--moonlight); opacity:0.85; border:1px solid rgba(240,238,235,0.25); padding:12px 14px; max-width:320px; }
  @media (max-width:900px){
    .authwrap{ grid-template-columns:1fr; }
    .authbrand{ border-right:none; border-bottom:1px solid var(--line-dark); min-height:260px; }
  }
</style>
</head>
<body>

<div class="frame light">
  <div class="authwrap">

    <div class="authbrand">
      <div class="mark" style="color:var(--moonlight);">
        <svg viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="3" stroke="var(--buckthorn)" stroke-width="1.6"/><path d="M8 8L12 12L8 16" stroke="var(--moonlight)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        SAYSO
      </div>
      <div>
        <div class="mono" style="color:var(--buckthorn); margin-bottom:16px;">04 — access</div>
        <div class="demo-line">"For every row in this sheet, draft an email and send it."</div>
      </div>
      <div class="mono" style="color:var(--moonlight); opacity:0.55;">sayso.xyz</div>
    </div>

    <div class="authform">
      <div class="top">
        <div class="toggle-row">
          <a href="#" class="active">Sign in</a>
          <a href="#">Create account</a>
        </div>
        <h2>Say it again.</h2>
        <p class="mono" style="text-transform:none; opacity:0.55; font-size:0.85rem; margin-top:10px;">Sign in to pick up where your workflows left off.</p>
      </div>

      <form onsubmit="return false;">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="name@company.com" />
        </div>
        <div class="field">
          <label for="pw">Password</label>
          <input id="pw" type="password" placeholder="••••••••••" />
        </div>
        <button class="btn btn-primary" style="width:100%; justify-content:center;">Sign in &rarr;</button>
      </form>

      <div class="rule">or continue with</div>
      <div class="oauth">
        <button class="btn btn-ghost-light" style="border-color:var(--line);">Google</button>
        <button class="btn btn-ghost-light" style="border-color:var(--line);">Github</button>
      </div>

      <p class="mono" style="text-transform:none; font-size:0.78rem; opacity:0.55; margin-top:32px;">
        No account? <a href="#" style="color:var(--ateneo); font-weight:700;">Create one</a>
      </p>
    </div>

  </div>
</div>

</body>
</html>
