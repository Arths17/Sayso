<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaySo — Building your workflow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .load-wrap{ min-height: calc(100vh - 32px - 2 * var(--frame)); display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; }
  .mark-lg{ width:88px; height:88px; margin-bottom:32px; }
  .mark-lg .chev{ animation: nudge 1.4s var(--ease) infinite; transform-origin:center; }
  @keyframes nudge{ 0%,100%{ transform: translateX(0); } 50%{ transform: translateX(3px); } }

  .status{ font-family:var(--font-mono); font-size:0.72rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--moonlight); opacity:0.7; margin-bottom:20px; }

  .bar-track{ width:min(420px, 80vw); height:2px; background: var(--line-dark); position:relative; }
  .bar-fill{ position:absolute; top:0; left:0; height:100%; width:0%; background: var(--buckthorn); animation: fill 2.6s var(--ease) infinite; }
  @keyframes fill{ 0%{ width:0%; } 60%{ width:78%; } 100%{ width:100%; } }

  .pct{ font-family:var(--font-mono); font-size:0.85rem; color:var(--moonlight); margin-top:16px; }

  .prompt-echo{ font-family:var(--font-mono); font-size:0.78rem; color:var(--moonlight); opacity:0.5; margin-bottom:36px; max-width:420px; text-align:center; }

  .corner{ position:absolute; font-family:var(--font-mono); font-size:0.66rem; letter-spacing:0.08em; text-transform:uppercase; color:var(--moonlight); opacity:0.5; }
  .corner.tl{ top:28px; left:var(--gutter); }
  .corner.tr{ top:28px; right:var(--gutter); }
  .corner.bl{ bottom:28px; left:var(--gutter); }
  .corner.br{ bottom:28px; right:var(--gutter); }
</style>
</head>
<body>

<div class="frame dark">
  <div class="load-wrap">

    <span class="corner tl">SAYSO</span>
    <span class="corner tr">05 — building</span>

    <svg class="mark-lg" viewBox="0 0 24 24" fill="none">
      <rect x="2" y="2" width="20" height="20" rx="3" stroke="var(--buckthorn)" stroke-width="1.4"/>
      <path class="chev" d="M8 8L12 12L8 16" stroke="var(--moonlight)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>

    <div class="prompt-echo">"Whenever I get an invoice PDF in Gmail, extract the total and Slack me."</div>

    <div class="status" id="statusline">parsing intent</div>

    <div class="bar-track">
      <div class="bar-fill"></div>
    </div>

    <div class="pct" id="pct">00%</div>

    <span class="corner bl">workflow / draft</span>
    <span class="corner br" id="clock">00:00</span>
  </div>
</div>

<script>
  var lines = ['parsing intent','selecting connectors','building node graph','ready to run'];
  var i = 0;
  var el = document.getElementById('statusline');
  setInterval(function(){
    i = (i+1) % lines.length;
    el.textContent = lines[i];
  }, 650);

  var p = 0;
  var pctEl = document.getElementById('pct');
  setInterval(function(){
    p = (p + 7) % 101;
    pctEl.textContent = String(p).padStart(2,'0') + '%';
  }, 180);

  var s = 0;
  var clockEl = document.getElementById('clock');
  setInterval(function(){
    s++;
    var m = String(Math.floor(s/60)).padStart(2,'0');
    var sec = String(s%60).padStart(2,'0');
    clockEl.textContent = m + ':' + sec;
  }, 1000);
</script>

</body>
</html>
